name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # The four quality gates (CLAUDE.md › Governance). Governance runs first —
      # it's the fastest and catches spec/code drift before the slow gates.
      - name: Gate 4 — Governance (spec reconciliation)
        run: npm run governance
      - name: Gate 1 — Types
        run: npm run typecheck
      - name: Gate 2 — Behavior (tests)
        run: npm test
      - name: Gate 3 — Build
        run: npm run build
